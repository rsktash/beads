name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # No NODE_AUTH_TOKEN — auth comes from GitHub OIDC via npm Trusted
      # Publishing (configured for @rsktash/bd-web on npmjs.com). Needs the
      # job's `id-token: write` permission (already set above).
      - run: npm publish --provenance --access public
