name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # No registry-url: it writes an .npmrc with `_authToken=${NODE_AUTH_TOKEN}`,
      # and an EMPTY token blocks npm from falling back to OIDC Trusted Publishing
      # (the registry defaults to npmjs.org anyway).
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      # No NODE_AUTH_TOKEN — auth comes from GitHub OIDC via npm Trusted
      # Publishing (configured for @rsktash/bd-web on npmjs.com). Needs the
      # job's `id-token: write` permission (already set above).
      - run: npm publish --provenance --access public
