version: "2"
sql:
  - engine: "sqlite"
    schema: "sql/schema.sqlite.sql"
    queries: "sql/queries.sql"
    gen:
      go:
        package: "sqlitedb"
        out: "internal/db/sqlitedb"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: true
  - engine: "postgresql"
    schema: "sql/schema.postgres.sql"
    queries: "sql/queries.sql"
    gen:
      go:
        package: "pgdb"
        out: "internal/db/pgdb"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: true
